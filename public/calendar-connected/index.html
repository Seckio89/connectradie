<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Google Calendar · ConnecTradie</title>
<meta name="robots" content="noindex" />
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:#0F1B2D;color:#0f172a;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:20px;max-width:380px;width:100%;padding:34px 28px;text-align:center;
        box-shadow:0 12px 40px rgba(0,0,0,.28)}
  .badge{width:66px;height:66px;border-radius:50%;font-size:32px;line-height:66px;margin:0 auto 18px;font-weight:700}
  h1{font-size:20px;margin:0 0 8px;color:#0f172a}
  p{font-size:14px;line-height:1.55;color:#475569;margin:0 0 22px}
  .btn{display:inline-block;background:#06D6A0;color:#06231b;text-decoration:none;font-weight:700;
       font-size:14px;padding:11px 22px;border-radius:12px;border:0;cursor:pointer}
  .brand{margin-top:22px;font-size:12px;color:#94a3b8;letter-spacing:.02em}
  .brand b{color:#0F1B2D}.brand b span{color:#06D6A0}
</style>
</head>
<body>
  <div class="card">
    <div class="badge" id="badge"></div>
    <h1 id="title"></h1>
    <p id="msg"></p>
    <button class="btn" onclick="window.close()">Close</button>
    <div class="brand"><b>Connec<span>Tradie</span></b></div>
  </div>
<script>
  var status = new URLSearchParams(location.search).get('status') || 'ok';
  var states = {
    ok:      { ok:true,  icon:'✓', title:'Google Calendar connected',
               msg:'You’re all set. Return to the ConnecTradie app and tap “Load my calendars” to import your jobs.' },
    expired: { ok:false, icon:'!',      title:'Sign-in expired',
               msg:'This Google sign-in link has expired. Return to the ConnecTradie app and tap Connect again.' },
    failed:  { ok:false, icon:'!',      title:'Couldn’t connect Google',
               msg:'Something went wrong connecting Google. Return to the ConnecTradie app and try Connect again.' }
  };
  var s = states[status] || states.ok;
  var accent = s.ok ? '#06D6A0' : '#E11D48';
  var badge = document.getElementById('badge');
  badge.textContent = s.icon;
  badge.style.background = accent + '1a';
  badge.style.color = accent;
  document.getElementById('title').textContent = s.title;
  document.getElementById('msg').textContent = s.msg;
</script>
</body>
</html>
